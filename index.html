<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦖 Dino World</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="hero">
    <h1>🦖 Dino World 🦕</h1>
    <p>
      Roam, stomp, and explore the land of dinosaurs!
    </p>
  </header>

  <main>
    <section class="haunted-gallery">
      
      <div class="card trex">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Tyrannosaurus_Rex.png" alt="T-Rex">
        <p>The mighty T-Rex is on the hunt!</p>
      </div>

      <div class="card triceratops">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/70/Triceratops_BW.jpg" alt="Triceratops">
        <p>The Triceratops charges forward!</p>
      </div>

      <div class="card brachiosaurus">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Brachiosaurus_DB.jpg" alt="Brachiosaurus">
        <p>A giant Brachiosaurus reaches the treetops.</p>
      </div>

    </section>

    <section class="cta">
      <button class="btn">Enter Jurassic World 🌿</button>
    </section>
  </main>

  <footer>
    <p>🌋 Welcome to the age of dinosaurs! 🦴</p>
  </footer>
</body>
</html>
